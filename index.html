<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6c2cff" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Organistuda</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Mock global aistudio to prevent runtime errors
      window.aistudio = {
        hasSelectedApiKey: () => Promise.resolve(false),
        openSelectKey: () => Promise.resolve()
      };

      // Registrar Service Worker para funcionamento offline
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(() => {
              // Service Worker registrado com sucesso
            })
            .catch(() => {
              // Falha silenciosa — app funciona normalmente sem SW
            });
        });
      }
    </script>
  </body>
</html>
