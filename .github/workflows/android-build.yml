name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. pnpm ────────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 4. Dependências Node ───────────────────────────────────────────
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Build Web ───────────────────────────────────────────────────
      - name: Build Web (Vite)
        run: pnpm run build

      # ── 6. Java 17 ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 7. Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT

      # ── 8. Capacitor Sync ──────────────────────────────────────────────
      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # ── 9. Corrigir local.properties ──────────────────────────────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 10. Build APK ──────────────────────────────────────────────────
      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 11. Upload Artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrganiStuda-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
