name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js 22 ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. pnpm ────────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 4. ETAPA 3 — Instalar dependências ────────────────────────────
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. ETAPA 4 — Build React (Vite) ───────────────────────────────
      - name: Build Web (Vite)
        run: pnpm run build

      # ── 6. JDK 21 (exigido pelo Capacitor 8.x / Java 21) ──────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 7. Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT

      - name: Install Android SDK platforms
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" --sdk_root=$ANDROID_SDK_ROOT

      # ── 8. ETAPA 5 — Sincronizar Capacitor ────────────────────────────
      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # ── 9. local.properties ───────────────────────────────────────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 10. ETAPA 6 — Limpar cache Gradle ─────────────────────────────
      - name: Clean Gradle cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon

      # ── 11. ETAPA 7 — Compilar APK ────────────────────────────────────
      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 12. ETAPA 9 — Upload APK como artifact ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrganiStuda-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
