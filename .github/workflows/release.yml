name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Web Project
        run: pnpm build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../OrganiStuda.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OrganiStuda.apk
          name: Release ${{ github.ref_name }}
          body: |
            Nova versão do OrganiStuda (Organizador e Banco de Questões para ENEM).
            
            Alterações nesta versão:
            - Nome do aplicativo alterado para **OrganiStuda**.
            - Novo ícone personalizado (centralizado e sem fundo).
            - Reformulação completa da gamificação.
            - Lógica de XP progressiva.
            - Melhorias de UX/UI para dispositivos móveis.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
