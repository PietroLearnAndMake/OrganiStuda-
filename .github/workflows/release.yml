name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag da release (ex: v3.2.0)'
        required: true
        default: 'v3.2.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js 22 ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. pnpm ────────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 4. ETAPA 3 — Instalar dependências ────────────────────────────
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. ETAPA 4 — Build React ───────────────────────────────────────
      - name: Build Web (Vite)
        run: pnpm run build

      # ── 6. JDK 21 ──────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 7. Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "platforms;android-35" "build-tools;36.0.0" --sdk_root=$ANDROID_SDK_ROOT

      # ── 8. ETAPA 5 — Sincronizar Capacitor ────────────────────────────
      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # ── 9. local.properties ───────────────────────────────────────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 10. ETAPA 6 — Limpar cache Gradle ─────────────────────────────
      - name: Clean Gradle cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon

      # ── 11. Determinar versão ─────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
          echo "DATE=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "DATETIME=$(date +'%d/%m/%Y às %H:%M UTC')" >> $GITHUB_OUTPUT

      # ── 12. ETAPA 7 — Compilar APK ────────────────────────────────────
      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk \
             ../OrganiStuda-${{ steps.version.outputs.VERSION }}.apk

      # ── 13. ETAPA 9 — Upload APK como artifact ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrganiStuda-${{ steps.version.outputs.VERSION }}
          path: OrganiStuda-${{ steps.version.outputs.VERSION }}.apk
          retention-days: 90

      # ── 14. ETAPA 10+11 — Criar Release com descrição automática ───────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: OrganiStuda-${{ steps.version.outputs.VERSION }}.apk
          name: "OrganiStuda ${{ steps.version.outputs.VERSION }}"
          body: |
            # OrganiStuda ${{ steps.version.outputs.VERSION }}
            ### Nova Build do Aplicativo

            > 📅 Build gerada em: **${{ steps.version.outputs.DATETIME }}**

            ---

            ## 📋 Descrição

            Esta versão inclui melhorias de estabilidade, correções de bugs, otimizações de segurança e atualizações no sistema do aplicativo.

            ---

            ## ✨ Novidades

            - ✅ Correção do sistema de build Android (JDK 21 + AGP 8.13.0)
            - 🔒 Segurança aprimorada: apenas HTTPS, permissões mínimas
            - 📱 Widget Android nativo na tela inicial com streak de estudos
            - 🔥 Sistema de sequência de dias (streak) com recorde pessoal
            - 🎨 Widget com tema automático (escuro/claro)
            - 📚 Banco com **733 questões** de vestibulares (ENEM, FUVEST, UNICAMP, UNESP, UERJ e mais)
            - 🏠 Funcionamento 100% local — nenhum dado enviado para servidores
            - 📶 Funciona offline após a primeira instalação

            ---

            ## 🔧 Correções de Bugs

            - Corrigido erro de build: incompatibilidade JDK 17 vs Java 21 (Capacitor 8.x)
            - Corrigido AGP 8.7.3 → 8.13.0 (compatível com Capacitor Android 8.2.0)
            - Corrigidas versões de bibliotecas AndroidX
            - Removidas dependências desnecessárias do projeto
            - Corrigidas safe areas (notch, home indicator)

            ---

            ## 🔒 Segurança

            - ✅ Apenas permissão `INTERNET` e `ACCESS_NETWORK_STATE`
            - ✅ Configuração de segurança de rede (apenas HTTPS)
            - ✅ Sem coleta de dados pessoais
            - ✅ Sem analytics ou rastreamento
            - ✅ Todos os dados armazenados localmente no dispositivo
            - ✅ `allowBackup="false"` para proteger dados do usuário

            ---

            ## 📱 Compatibilidade

            | Requisito | Versão |
            |-----------|--------|
            | Android mínimo | **8.0 (API 24)** |
            | Android alvo | **15 (API 35)** |
            | Arquitetura | arm64-v8a, armeabi-v7a, x86_64 |

            ---

            ## 📥 Como instalar

            1. Baixe o arquivo **`OrganiStuda-${{ steps.version.outputs.VERSION }}.apk`** abaixo
            2. No Android: **Configurações → Segurança → Instalar apps desconhecidos**
            3. Selecione seu gerenciador de arquivos e ative a permissão
            4. Abra o arquivo APK e toque em **Instalar**

            ---

            ## 📦 Arquivo disponível

            | Arquivo | Tipo | Descrição |
            |---------|------|-----------|
            | `OrganiStuda-${{ steps.version.outputs.VERSION }}.apk` | APK Debug | Pronto para instalação |

            ---

            *Desenvolvido com ❤️ para estudantes do ENEM*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
