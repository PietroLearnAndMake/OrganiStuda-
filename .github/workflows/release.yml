name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Web Project
        run: pnpm build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../OrganiStuda-${{ github.ref_name }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OrganiStuda-${{ github.ref_name }}.apk
          name: "OrganiStuda ${{ github.ref_name }}"
          body: |
            ## 🚀 OrganiStuda ${{ github.ref_name }}

            ### 📱 Como instalar
            1. Baixe o arquivo `OrganiStuda-${{ github.ref_name }}.apk` abaixo
            2. No Android, vá em **Configurações → Segurança → Fontes desconhecidas** e ative
            3. Abra o arquivo APK e instale

            ---

            ### ✅ Correções de Bugs
            - **Acerto de questões**: Som e conquista agora funcionam corretamente ao acertar uma questão
            - **Streak no primeiro uso**: A sequência de dias agora inicia corretamente no primeiro acesso
            - **Loading de busca**: O indicador de carregamento agora aparece ao buscar questões
            - **Erro TypeScript (periodicSync)**: Corrigido com cast de tipo seguro
            - **Modo escuro nos filtros**: Selects e abas agora respeitam o tema escuro corretamente
            - **Memory leak**: Event listeners agora são removidos corretamente ao desmontar componentes

            ### 🆕 Novos Widgets
            - **🔥 Widget de Sequência de Estudos**: Exibe dias consecutivos, recorde pessoal e indicador visual da semana atual — integrado na aba Início
            - **📊 Widget de Desempenho**: Mostra total de questões feitas, acertos e taxa de acerto com barra de progresso — aparece na aba Início e Conquistas
            - **🏆 Card de Streak nas Conquistas**: Marcos de sequência (3, 7, 14, 30, 100 dias) com visual de progresso
            - **⭐ Conquistas por Matéria**: Lista de conquistas desbloqueadas por matéria na aba Conquistas
            - **💡 Dicas Pomodoro**: Card informativo com dicas de uso do método Pomodoro

            ### 🎮 Melhorias de Gamificação
            - **+50 XP** ao completar uma sessão Pomodoro (com notificação toast)
            - **+25 XP** ao concluir uma tarefa na lista de tarefas
            - **Recorde de streak** (`bestStreak`) agora é rastreado e exibido
            - Feedback visual melhorado: ✅ CORRETO! / ❌ ERRADO

            ### 🎨 Melhorias de UX
            - Texto das questões preserva formatação original (quebras de linha)
            - Ícones da navegação inferior com cor correta no modo escuro
            - Tela vazia com mensagem amigável na aba Tarefas
            - Contador de tarefas pendentes/concluídas
            - Mensagem "Nenhuma questão encontrada" no modo filtro

            ### 📚 Banco de Questões
            - **387 questões** no total (205 originais + 182 novas)
            - Questões de ENEM, FUVEST e UNICAMP (2018–2025)
            - Matérias: Matemática, Linguagens, C. Humanas, C. Natureza, Redação

            ---
            *Desenvolvido com ❤️ para estudantes do ENEM*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
