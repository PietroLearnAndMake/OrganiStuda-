name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v3.1.0)'
        required: true
        default: 'v3.1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. pnpm ────────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 4. Dependências Node ───────────────────────────────────────────
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Build Web ───────────────────────────────────────────────────
      - name: Build Web (Vite)
        run: pnpm run build

      # ── 6. Java 17 ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 7. Android SDK ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT

      # ── 8. Capacitor Sync ──────────────────────────────────────────────
      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # ── 9. local.properties ───────────────────────────────────────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 10. Determinar versão ─────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # ── 11. Build APK ─────────────────────────────────────────────────
      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk ../OrganiStuda-${{ steps.version.outputs.VERSION }}.apk

      # ── 12. Upload Artifact ───────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrganiStuda-${{ steps.version.outputs.VERSION }}
          path: OrganiStuda-${{ steps.version.outputs.VERSION }}.apk
          retention-days: 90

      # ── 13. Create/Update Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: OrganiStuda-${{ steps.version.outputs.VERSION }}.apk
          name: "OrganiStuda ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🚀 OrganiStuda ${{ steps.version.outputs.VERSION }}

            ### 📱 Como instalar
            1. Baixe o arquivo `OrganiStuda-${{ steps.version.outputs.VERSION }}.apk` abaixo
            2. No Android, vá em **Configurações → Segurança → Instalar apps desconhecidos** e ative para o seu gerenciador de arquivos
            3. Abra o arquivo APK e instale

            ### ✨ Novidades desta versão
            - 🔥 **Widget Android** — Adicione na tela inicial para ver sua sequência de estudos
            - 📊 **Sistema de Streak** — Acompanhe seus dias consecutivos de estudo
            - 🎨 **Widget com tema** — Detecta automaticamente modo escuro/claro
            - 📚 **733 questões** de vestibulares (ENEM, FUVEST, UNICAMP, UNESP, UERJ e mais)
            - 🔧 **Safe Areas corrigidas** — Compatível com notch e home indicator

            ---
            *Desenvolvido com ❤️ para estudantes do ENEM*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
