name: Build OrganiStuda APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Puxa o código
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Instala pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4️⃣ Instala dependências do projeto
      - name: Install dependencies
        run: pnpm install

      # 5️⃣ Build dos assets web
      - name: Build web assets
        run: pnpm build

      # 6️⃣ Configura Java 21 (⚠️ ESSENCIAL!)
      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 7️⃣ Adiciona a plataforma Android do Capacitor
      - name: Add Android platform
        run: |
          npx cap add android
          npx cap copy

      # 8️⃣ Build Debug APK
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 9️⃣ Build Release APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # 🔟 Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: organistuda-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 1️⃣1️⃣ Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v3
        with:
          name: organistuda-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
