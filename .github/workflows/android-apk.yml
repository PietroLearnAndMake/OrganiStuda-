name: Build APK OrganiStuda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checar código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node e PNPM
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup PNPM
        run: npm install -g pnpm

      # 3️⃣ Instalar dependências
      - name: Install dependencies
        run: pnpm install

      # 4️⃣ Build web assets
      - name: Build web assets
        run: pnpm build

      # 5️⃣ Configurar Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 6️⃣ Adicionar plataforma Android Capacitor
      - name: Add Capacitor Android
        run: |
          npx cap add android
          npx cap copy

      # 7️⃣ Build APK debug
      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      # 8️⃣ Build APK release
      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease

      # 9️⃣ Upload dos APKs
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: OrganiStuda-APK
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
