name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar o repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Instalar dependências
      - name: Install dependencies
        run: pnpm install

      # 4️⃣ Build do web app
      - name: Build Web Assets
        run: pnpm build

      # 5️⃣ Configurar Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 6️⃣ Instalar Capacitor
      - name: Install Capacitor CLI
        run: pnpm add @capacitor/cli --global

      # 7️⃣ Preparar Android
      - name: Add Android Platform
        run: |
          npx cap add android || echo "Android already added"
          npx cap copy

      # 8️⃣ Build APK Debug
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 9️⃣ Build APK Release
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 🔟 Fazer upload para GitHub Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Release APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/release/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
