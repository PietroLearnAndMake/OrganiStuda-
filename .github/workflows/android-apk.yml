name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar o repositório
      - uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Instalar dependências
      - run: pnpm install

      # 4️⃣ Build do web app
      - run: pnpm build

      # 5️⃣ **Configurar Java 21** (isso resolve o erro)
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 6️⃣ Instalar Capacitor CLI global
      - run: pnpm add @capacitor/cli --global

      # 7️⃣ Preparar Android
      - run: |
          npx cap add android || echo "Android já adicionado"
          npx cap copy

      # 8️⃣ Build APK Debug
      - run: |
          cd android
          ./gradlew assembleDebug

      # 9️⃣ Build APK Release
      - run: |
          cd android
          ./gradlew assembleRelease

      # 🔟 Upload para Releases do GitHub
      - uses: actions/create-release@v1
        id: create_release
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive

      - uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/release/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
