name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}-${{ steps.date.outputs.date }}
          name: "OrganiStuda ${{ steps.version.outputs.tag }} - Redesign Profissional + Gamificação"
          body: |
            🚀 **OrganiStuda - Versão ${{ steps.version.outputs.tag }}**
            
            ✨ **Novidades:**
            - Redesign profissional completo da interface
            - Sistema de conquistas gamificado (25+ medalhas)
            - Sistema de XP e níveis para engajar estudantes
            - Curva de aprendizado visual
            - Notificações toast animadas
            - Modo imersivo (tela cheia sem barras do sistema)
            - Correção de todos os bugs identificados
            - Nova logo "OrganiStuda"
            
            📥 **Download:** Clique no APK abaixo para instalar no seu Android
            
            🎮 **Como usar:**
            1. Baixe o arquivo APK
            2. Ative "Instalar de fontes desconhecidas" nas configurações do seu Android
            3. Abra o APK e instale
            4. Aproveite seus estudos!
            
            📊 **Recursos:**
            - Banco de questões com 2400+ questões
            - Cronômetro Pomodoro integrado
            - Rastreamento de progresso
            - Modo escuro/claro
            - Compatível com Android 8.0+
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrganiStuda-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
