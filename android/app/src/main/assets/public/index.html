<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6c2cff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Organistuda</title>
    <script type="module" crossorigin src="/assets/index-Da669_xn.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DfqXExBH.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Desabilitar menu de contexto (clique direito / segurar) para parecer app nativo
      document.addEventListener('contextmenu', event => event.preventDefault());

      // Impedir zoom por gestos (pinch zoom) e duplo toque
      document.addEventListener('touchstart', (event) => {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener('touchend', (event) => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // Mock global aistudio to prevent runtime errors
      window.aistudio = {
        hasSelectedApiKey: () => Promise.resolve(false),
        openSelectKey: () => Promise.resolve()
      };

      // Registrar Service Worker para funcionamento offline
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(() => {
              // Service Worker registrado com sucesso
            })
            .catch(() => {
              // Falha silenciosa — app funciona normalmente sem SW
            });
        });
      }
    </script>
  </body>
</html>
